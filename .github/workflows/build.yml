name: Build obi-one

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-14
            artifact: obi-one-macos-universal
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            pdfium_target: mac-universal
            build_command: npm run build -- --target universal-apple-darwin --bundles app --no-sign
            bundle_path: dist/macos/*
          - name: Windows
            os: windows-latest
            artifact: obi-one-windows
            rust_targets: x86_64-pc-windows-msvc
            pdfium_target: windows-x64
            build_command: npm run build -- --bundles nsis,msi
            bundle_path: |
              src-tauri/target/release/bundle/nsis/**/*-setup.exe
              src-tauri/target/release/bundle/msi/**/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_targets }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch PDFium
        shell: bash
        run: ./scripts/fetch-pdfium.sh ${{ matrix.platform.pdfium_target }}

      - name: Test Rust core
        working-directory: src-tauri
        run: cargo test --lib --bins

      - name: Build Tauri app
        run: ${{ matrix.platform.build_command }}

      - name: Sign, verify, and package universal macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/package-macos.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ${{ matrix.platform.bundle_path }}
          if-no-files-found: error
